---
# Allow External Secrets to copy the Tailscale operator OAuth secret into the
# searxng namespace so the proxy can register as its own tailnet device.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-tailscale-operator-oauth
  namespace: tailscale-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["operator-oauth"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: searxng-read-tailscale-operator-oauth
  namespace: tailscale-system
subjects:
  - kind: ServiceAccount
    name: searxng-external-secrets-sa
    namespace: searxng
roleRef:
  kind: Role
  name: read-tailscale-operator-oauth
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: tailscale-operator-secret-store
  namespace: searxng
spec:
  provider:
    kubernetes:
      remoteNamespace: tailscale-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: searxng-external-secrets-sa

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-egress-proxy-tailscale-auth
  namespace: searxng
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tailscale-operator-secret-store
    kind: SecretStore
  target:
    name: searxng-egress-proxy-tailscale-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        TS_CLIENT_ID: "{{ .client_id }}"
        TS_CLIENT_SECRET: "{{ .client_secret }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: operator-oauth
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: operator-oauth
        property: client_secret

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: searxng-egress-proxy
  namespace: searxng

---
# Tailscale stores the proxy identity in a Kubernetes Secret so the singleton
# keeps the same device identity across restarts.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: searxng-egress-proxy
  namespace: searxng
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["searxng-egress-proxy-state"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: searxng-egress-proxy
  namespace: searxng
subjects:
  - kind: ServiceAccount
    name: searxng-egress-proxy
    namespace: searxng
roleRef:
  kind: Role
  name: searxng-egress-proxy
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-egress-proxy-config
  namespace: searxng
data:
  TS_ACCEPT_DNS: "true"
  TS_AUTH_ONCE: "true"
  TS_HOSTNAME: "searxng-egress-proxy"
  TS_KUBE_SECRET: "searxng-egress-proxy-state"
  TS_OUTBOUND_HTTP_PROXY_LISTEN: ":8080"
  TS_USERSPACE: "true"
  # tag:mullvad is a dedicated tag that grants Mullvad license slots only to this
  # proxy, keeping k8s-operator devices out of the Mullvad license count.
  TS_EXTRA_ARGS: "--advertise-tags=tag:k8s-operator,tag:mullvad --exit-node=ch-zrh-wg-201.mullvad.ts.net --exit-node-allow-lan-access=true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng-egress-proxy
  namespace: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng-egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng-egress-proxy
    spec:
      serviceAccountName: searxng-egress-proxy
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:stable
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: searxng-egress-proxy-config
          env:
            - name: TS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: searxng-egress-proxy-tailscale-auth
                  key: TS_CLIENT_ID
            - name: TS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-egress-proxy-tailscale-auth
                  key: TS_CLIENT_SECRET
          ports:
            - name: http-proxy
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http-proxy
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http-proxy
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: searxng-egress-proxy
  namespace: searxng
spec:
  selector:
    app.kubernetes.io/name: searxng-egress-proxy
  ports:
    - name: http-proxy
      port: 8080
      targetPort: http-proxy
      protocol: TCP
