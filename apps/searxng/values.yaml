## Values for TrueCharts searxng chart
# TrueCharts expects app-specific values under workload.main, not top-level env.
workload:
  main:
    podSpec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution: []
      containers:
        main:
          env:
            BASE_URL: "https://search.oisd.io"
            HTTP_PROXY: "http://searxng-egress-proxy.searxng.svc.cluster.local:8080"
            HTTPS_PROXY: "http://searxng-egress-proxy.searxng.svc.cluster.local:8080"
            NO_PROXY: "127.0.0.1,localhost,.svc,.cluster.local"

# Disable Redis entirely for initial deployment
cnpg:
  redis:
    enabled: false

redis:
  enabled: false

# Ingress (optional)
ingress:
  main:
    enabled: true
    hosts:
      - host: search.oisd.io
        paths:
          - path: /
            pathType: Prefix

persistence:
  config:
    enabled: true
    size: 256Mi
