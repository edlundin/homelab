## Values for TrueCharts searxng chart
# TrueCharts expects app-specific values under workload.main, not top-level env.
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            BASE_URL: "https://search.oisd.io"

# Disable Redis entirely for initial deployment
cnpg:
  redis:
    enabled: false

redis:
  enabled: false

# Ingress (optional)
ingress:
  main:
    enabled: true
    hosts:
      - host: search.oisd.io
        paths:
          - path: /
            pathType: Prefix

secret:
  searxng-config:
    enabled: false

persistence:
  config:
    enabled: true
    type: secret
    objectName: searxng-config
    mountPath: /etc/searxng
