apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: picsou
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: picsou
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://github.com/edlundin/homelab.git
      targetRevision: master
      path: apps/picsou
      directory:
        include: "{picsou-secrets-sealed.yaml,postgres.yaml,deployment.yaml,ingress.yaml}"
