---
apiVersion: v1
kind: ConfigMap
metadata:
    name: coredns-custom
    namespace: kube-system
data:
    disable-aaaa.override: |
        # Return an empty NOERROR response for all IPv6 address lookups.
        # This keeps cluster DNS IPv4-only so workloads like SearXNG do not try IPv6 egress.
        template IN AAAA . {
            rcode NOERROR
        }
    tailscale.server: |
        # Resolve tailnet names through the Tailscale Kubernetes operator nameserver.
        # Keep general recursion in the main k3s CoreDNS Corefile (`forward . /etc/resolv.conf`),
        # which uses node systemd-resolved and host Tailscale DNS. Do not point cluster
        # DNS at LAN/public resolvers here; all non-Kubernetes DNS should stay on Tailscale.
        ts.net {
            errors
            cache 30
            forward . nameserver.tailscale-system.svc.cluster.local
        }
