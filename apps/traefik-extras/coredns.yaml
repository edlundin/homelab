---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        hosts /etc/coredns/NodeHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        # Use Tailscale DNS directly. Do not forward to /etc/resolv.conf here:
        # inside the CoreDNS pod it can point back to cluster DNS and create a loop.
        forward . 100.100.100.100
        cache 30
        loop
        reload
        loadbalance
        import /etc/coredns/custom/*.override
    }
    import /etc/coredns/custom/*.server
  NodeHosts: |
    192.168.2.1 610n1r0
    192.168.2.100 k3s-master-1
    192.168.2.101 k3s-master-2
    192.168.2.102 k3s-master-3
    192.168.2.103 k3s-agent-1
    192.168.2.104 k3s-agent-2
