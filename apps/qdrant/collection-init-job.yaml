apiVersion: batch/v1
kind: Job
metadata:
  name: qdrant-collection-init
  namespace: qdrant
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-collection
          image: curlimages/curl:8.19.0
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          command:
            - /bin/sh
            - -ec
            - |
              # Wait for Qdrant to be ready
              echo "Waiting for Qdrant to be ready..."
              until curl -fsS http://qdrant:6333/readyz >/dev/null; do
                echo "Qdrant not ready, waiting..."
                sleep 5
              done

              if curl -fsS "http://qdrant:6333/collections/code_chunks" >/dev/null; then
                echo "Collection code_chunks already exists, skipping create"
              else
                echo "Creating collection code_chunks..."
                curl -fsS -X PUT "http://qdrant:6333/collections/code_chunks" \
                  -H "Content-Type: application/json" \
                  --data @/config/collection-config.json >/dev/null
              fi

              echo "Ensuring payload indexes exist..."

              for field in path lang symbol; do
                curl -fsS -X PUT "http://qdrant:6333/collections/code_chunks/index" \
                  -H "Content-Type: application/json" \
                  --data "{\"field_name\":\"${field}\",\"field_schema\":\"keyword\"}" >/dev/null
              done

              echo "Collection initialization completed successfully"
          volumeMounts:
            - name: config-volume
              mountPath: /config
      volumes:
        - name: config-volume
          configMap:
            name: qdrant-collection-config
