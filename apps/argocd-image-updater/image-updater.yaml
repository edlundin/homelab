apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: homelab-services
  namespace: argocd
spec:
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-github
    gitConfig:
      repository: https://github.com/edlundin/homelab.git
      branch: master
  applicationRefs:
    - namePattern: argocd-image-updater
      writeBackConfig:
        gitConfig:
          writeBackTarget: helmvalues:/apps/argocd-image-updater/values.yaml
      images:
        - alias: argocd-image-updater
          imageName: quay.io/argoprojlabs/argocd-image-updater:v1.x
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: n8n
      images:
        - alias: n8n
          imageName: n8nio/n8n:1.x
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: regexp:^[0-9]+\.[0-9]+\.[0-9]+$
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: qdrant
      writeBackConfig:
        gitConfig:
          writeBackTarget: helmvalues:/apps/qdrant/values.yaml
      images:
        - alias: qdrant
          imageName: qdrant/qdrant:v1.x
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: pulse
      writeBackConfig:
        gitConfig:
          writeBackTarget: kustomization:/apps/pulse/kustomization.yaml
      images:
        - alias: pulse
          imageName: rcourtman/pulse:5.x
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: regexp:^[0-9]+\.[0-9]+\.[0-9]+$
          manifestTargets:
            kustomize:
              name: rcourtman/pulse
    - namePattern: searxng
      writeBackConfig:
        gitConfig:
          writeBackTarget: helmvalues:/apps/searxng/values.yaml
      images:
        - alias: searxng
          imageName: docker.io/searxng/searxng:latest
          commonUpdateSettings:
            updateStrategy: digest
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
