apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argocd-image-updater
      targetRevision: 1.2.0
      helm:
        valueFiles:
          - $values/apps/argocd-image-updater/values.yaml
    - repoURL: https://github.com/edlundin/homelab.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/edlundin/homelab.git
      targetRevision: HEAD
      path: apps/argocd-image-updater
      directory:
        exclude: "{application.yaml,.secrets.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
